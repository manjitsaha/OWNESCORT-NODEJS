name: Node.js CI/CD

on:
  push:
    branches:
      - main
      - testserver

jobs:
  deploy-prod:
    name: Deploy to production server
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Restart PM2
        run: pm2 restart 0 --update-env

  deploy-test:
    name: Deploy to test server
    if: github.ref == 'refs/heads/testserver'
    runs-on: test
    # OR runs-on: [self-hosted, test] if you used labels

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Restart PM2
        run: pm2 restart 0 --update-env
